<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolex Sport News | Live GitHub Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    
    <style>
        :root {
            --primary: #ff4757;
            --secondary: #0f172a;
            --accent: #38bdf8;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --fav-gold: #fbbf24;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--secondary); color: var(--text-main); }

        /* Navigation */
        header {
            background: #111827;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
        }

        .brand { font-size: 1.5rem; font-weight: 900; }
        .brand span { color: var(--primary); }

        /* Controls */
        .controls { padding: 20px 5%; background: #111827; display: flex; flex-wrap: wrap; gap: 10px; }
        .search-box { flex: 1; min-width: 200px; }
        .search-box input { width: 90%; padding: 10px; border-radius: 5px; border: none; background: var(--card-bg); color: white; }

        .btn { padding: 10px 15px; border: none; border-radius: 5px; background: var(--card-bg); color: white; cursor: pointer; }
        .btn.active { background: var(--primary); }

        /* Grid */
        .container { padding: 20px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }

        /* Card Styling */
        .card { background: var(--card-bg); border-radius: 10px; padding: 20px; border-left: 5px solid var(--accent); }
        .match-info { margin-bottom: 15px; }
        .team-name { font-weight: bold; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .fav-star { color: #475569; transition: 0.3s; }
        .fav-star.active { color: var(--fav-gold); }
        
        .live-tag { color: var(--primary); font-size: 0.7rem; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<header>
    <div class="brand">BOLEX <span>SPORT NEWS</span></div>
    <div id="update-timer" style="font-size: 0.8rem; color: var(--accent);">Updating in 60s...</div>
</header>

<div class="controls">
    <div class="search-box">
        <input type="text" id="searchBar" placeholder="Search teams or leagues...">
    </div>
    <button class="btn active" id="btn-all" onclick="filterSport('All')">All</button>
    <button class="btn" id="btn-fav" onclick="toggleFavFilter()"><i class="fas fa-star"></i> Favorites</button>
</div>

<div class="container">
    <div id="feed" class="grid">
        <p>Loading Live Global Stats...</p>
    </div>
</div>

<script>
    let allEvents = [];
    let favorites = JSON.parse(localStorage.getItem('bolex_favs')) || [];
    let currentSport = 'All';
    let onlyFavs = false;
    let timeLeft = 60;

    const LEAGUES = ['4328', '4387', '4391', '4370']; // EPL, NBA, NFL, F1

    async function fetchData() {
        try {
            // Using the public test API key "3" for demonstration
            const requests = LEAGUES.map(id => 
                fetch(`https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id=${id}`).then(res => res.json())
            );
            const results = await Promise.all(requests);
            allEvents = results.flatMap(r => r.events || []);
            render();
            timeLeft = 60;
        } catch (e) {
            console.error("API Error");
        }
    }

    // Timer Logic
    setInterval(() => {
        timeLeft--;
        document.getElementById('update-timer').innerText = `Updating in ${timeLeft}s...`;
        if (timeLeft <= 0) fetchData();
    }, 1000);

    function toggleFav(team) {
        if (favorites.includes(team)) {
            favorites = favorites.filter(t => t !== team);
        } else {
            favorites.push(team);
        }
        localStorage.setItem('bolex_favs', JSON.stringify(favorites));
        render();
    }

    function filterSport(s) {
        currentSport = s;
        render();
    }

    function toggleFavFilter() {
        onlyFavs = !onlyFavs;
        document.getElementById('btn-fav').classList.toggle('active');
        render();
    }

    document.getElementById('searchBar').addEventListener('input', render);

    function render() {
        const query = document.getElementById('searchBar').value.toLowerCase();
        const feed = document.getElementById('feed');
        
        const filtered = allEvents.filter(ev => {
            const matchesSearch = ev.strEvent.toLowerCase().includes(query);
            const matchesFav = !onlyFavs || (favorites.includes(ev.strHomeTeam) || favorites.includes(ev.strAwayTeam));
            return matchesSearch && matchesFav;
        });

        feed.innerHTML = filtered.map(ev => {
            const isHomeFav = favorites.includes(ev.strHomeTeam);
            const isAwayFav = favorites.includes(ev.strAwayTeam);

            return `
                <div class="card">
                    <div class="live-tag">● LIVE TRACKING</div>
                    <div class="match-info">
                        <div class="team-name" onclick="toggleFav('${ev.strHomeTeam}')">
                            <i class="fas fa-star fav-star ${isHomeFav ? 'active' : ''}"></i>
                            ${ev.strHomeTeam}
                        </div>
                        <div style="margin: 5px 0 5px 25px; color: #64748b;">vs</div>
                        <div class="team-name" onclick="toggleFav('${ev.strAwayTeam}')">
                            <i class="fas fa-star fav-star ${isAwayFav ? 'active' : ''}"></i>
                            ${ev.strAwayTeam}
                        </div>
                    </div>
                    <div style="font-size: 0.8rem; color: var(--accent); font-weight: bold;">${ev.strLeague}</div>
                    <div style="font-size: 0.75rem; margin-top: 5px; color: #94a3b8;">${ev.dateEvent} | ${ev.strTime}</div>
                </div>
            `;
        }).join('');
    }

    fetchData();
</script>
</body>
</html>
