<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolex Sport News | Ultra Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    
    <style>
        :root {
            --primary: #ef4444;
            --secondary: #0f172a;
            --accent: #38bdf8;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --fav-gold: #fbbf24;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background: var(--secondary); 
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* --- Header & Navigation --- */
        header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #334155;
        }

        .brand { font-size: 1.5rem; font-weight: 900; letter-spacing: -1px; }
        .brand span { color: var(--primary); }

        .connection-indicator { font-size: 0.8rem; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .dot { height: 8px; width: 8px; background: #4ade80; border-radius: 50%; }

        /* --- Control Panel --- */
        .controls {
            padding: 20px 5%;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            background: #111827;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 45px;
            background: var(--card-bg);
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            outline: none;
        }

        .search-box i { position: absolute; left: 15px; top: 15px; color: var(--text-muted); }

        .filter-group { display: flex; gap: 10px; }
        .btn {
            padding: 10px 18px;
            border-radius: 6px;
            border: 1px solid #334155;
            background: var(--card-bg);
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn:hover { border-color: var(--accent); }
        .btn.active { background: var(--primary); border-color: var(--primary); }
        .btn-fav { color: var(--fav-gold); }

        /* --- Match Grid --- */
        .container { padding: 30px 5%; min-height: 80vh; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px; 
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .card:hover { transform: translateY(-5px); border-color: var(--accent); }

        .match-header { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 0.75rem; color: var(--text-muted); font-weight: bold; }
        
        .team-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin: 10px 0;
            cursor: pointer;
        }

        .team-info { display: flex; align-items: center; gap: 12px; }
        .fav-star { color: #475569; transition: 0.2s; }
        .fav-star.active { color: var(--fav-gold); transform: scale(1.2); }

        .match-footer {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
        }

        .live-pulse {
            color: var(--primary);
            animation: blink 1.5s infinite;
        }

        @keyframes blink { 50% { opacity: 0.3; } }
        
        /* Skeleton Loader */
        .skeleton { height: 200px; background: #1e293b; border-radius: 12px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 50% { background: #334155; } }

    </style>
</head>
<body>

<header>
    <div class="brand">BOLEX <span>SPORT NEWS</span></div>
    <div class="connection-indicator">
        <div class="dot" id="status-dot"></div>
        <span id="status-text">CONNECTING</span>
    </div>
</header>

<div class="controls">
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchBar" placeholder="Search teams, leagues, or sports...">
    </div>
    
    <div class="filter-group">
        <button class="btn active" onclick="setFilter('All')">All</button>
        <button class="btn" onclick="setFilter('Soccer')">Football</button>
        <button class="btn" onclick="setFilter('Basketball')">NBA</button>
        <button class="btn btn-fav" onclick="toggleFavoritesOnly()"><i class="fas fa-star"></i> Favorites</button>
    </div>
</div>

<div class="container">
    <div id="feed" class="grid">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
    </div>
</div>

<script>
    const socket = io();
    let allEvents = [];
    let currentFilter = 'All';
    let showFavoritesOnly = false;
    let favorites = JSON.parse(localStorage.getItem('bolex_favs')) || [];

    // --- WebSocket Listeners ---
    socket.on('connect', () => {
        document.getElementById('status-dot').style.background = '#4ade80';
        document.getElementById('status-text').innerText = 'LIVE SERVER';
    });

    socket.on('disconnect', () => {
        document.getElementById('status-dot').style.background = '#ef4444';
        document.getElementById('status-text').innerText = 'OFFLINE';
    });

    socket.on('sportsUpdate', (data) => {
        allEvents = data;
        render();
    });

    // --- Business Logic ---
    function setFilter(sport) {
        currentFilter = sport;
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        render();
    }

    function toggleFavoritesOnly() {
        showFavoritesOnly = !showFavoritesOnly;
        event.target.classList.toggle('active');
        render();
    }

    function toggleFav(team) {
        if (favorites.includes(team)) {
            favorites = favorites.filter(t => t !== team);
        } else {
            favorites.push(team);
        }
        localStorage.setItem('bolex_favs', JSON.stringify(favorites));
        render();
    }

    document.getElementById('searchBar').addEventListener('input', render);

    // --- The Main Render Engine ---
    function render() {
        const searchTerm = document.getElementById('searchBar').value.toLowerCase();
        const feed = document.getElementById('feed');
        
        let filtered = allEvents.filter(ev => {
            const matchesSport = currentFilter === 'All' || ev.strSport === currentFilter;
            const matchesSearch = ev.strEvent.toLowerCase().includes(searchTerm) || ev.strLeague.toLowerCase().includes(searchTerm);
            const matchesFav = !showFavoritesOnly || (favorites.includes(ev.strHomeTeam) || favorites.includes(ev.strAwayTeam));
            return matchesSport && matchesSearch && matchesFav;
        });

        if (filtered.length === 0) {
            feed.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:50px; color:var(--text-muted)">
                <i class="fas fa-ghost fa-3x"></i><br><br>No matches found in this category.
            </div>`;
            return;
        }

        feed.innerHTML = filtered.map(ev => {
            const isHomeFav = favorites.includes(ev.strHomeTeam);
            const isAwayFav = favorites.includes(ev.strAwayTeam);

            return `
                <div class="card">
                    <div class="match-header">
                        <span>${ev.strLeague}</span>
                        <span class="live-pulse">● TRACKING</span>
                    </div>
                    
                    <div class="team-row" onclick="toggleFav('${ev.strHomeTeam}')">
                        <div class="team-info">
                            <i class="fas fa-star fav-star ${isHomeFav ? 'active' : ''}"></i>
                            <span>${ev.strHomeTeam}</span>
                        </div>
                    </div>
                    
                    <div class="team-row" onclick="toggleFav('${ev.strAwayTeam}')">
                        <div class="team-info">
                            <i class="fas fa-star fav-star ${isAwayFav ? 'active' : ''}"></i>
                            <span>${ev.strAwayTeam}</span>
                        </div>
                    </div>

                    <div class="match-footer">
                        <div><i class="far fa-calendar-alt"></i> ${ev.dateEvent}</div>
                        <div><i class="far fa-clock"></i> ${ev.strTime}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
</script>

</body>
</html>
